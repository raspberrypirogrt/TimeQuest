<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TimeQuest">
  <meta name="theme-color" content="#0F1923">
  <meta name="description" content="TimeQuest — 時間管理 PWA App">
  
  <title>TimeQuest</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/timeline.css">
  <link rel="stylesheet" href="css/tasks.css">
  <link rel="stylesheet" href="css/habits.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div id="app">
    <!-- Safe area top -->
    <div class="safe-area-top"></div>
    
    <!-- Pages container -->
    <div id="pages-container">
      <!-- Page 1: Home -->
      <div class="page active" id="page-home" data-page="home">
        <div class="sub-page-indicator">
          <span class="indicator-dot active" data-sub="0"></span>
          <span class="indicator-dot" data-sub="1"></span>
        </div>
        <div class="swipe-container" id="home-swipe">
          <div class="swipe-track">
            <div class="sub-page" id="home-timeline"></div>
            <div class="sub-page" id="home-tasks"></div>
          </div>
        </div>
      </div>
      
      <!-- Page 2: Schedule -->
      <div class="page" id="page-schedule" data-page="schedule">
        <div class="sub-page-indicator">
          <span class="indicator-dot active" data-sub="0"></span>
          <span class="indicator-dot" data-sub="1"></span>
        </div>
        <div class="swipe-container" id="schedule-swipe">
          <div class="swipe-track">
            <div class="sub-page" id="schedule-timeline"></div>
            <div class="sub-page" id="schedule-tasks"></div>
          </div>
        </div>
      </div>
      
      <!-- Page 3: Habits -->
      <div class="page" id="page-habits" data-page="habits">
        <div class="sub-page-indicator">
          <span class="indicator-dot active" data-sub="0"></span>
          <span class="indicator-dot" data-sub="1"></span>
        </div>
        <div class="swipe-container" id="habits-swipe">
          <div class="swipe-track">
            <div class="sub-page" id="habits-stats"></div>
            <div class="sub-page" id="habits-manage"></div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- FAB Button -->
    <button class="fab" id="fab-btn" aria-label="新增">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
    
    <!-- Bottom Tab Bar -->
    <nav class="tab-bar" id="tab-bar">
      <button class="tab-item active" data-tab="home" id="tab-home">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
        </svg>
        <span class="tab-label">首頁</span>
      </button>
      <button class="tab-item" data-tab="schedule" id="tab-schedule">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span class="tab-label">排程</span>
      </button>
      <button class="tab-item" data-tab="habits" id="tab-habits">
        <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span class="tab-label">習慣</span>
      </button>
    </nav>
    
    <!-- Safe area bottom -->
    <div class="safe-area-bottom"></div>
  </div>
  
  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title"></h3>
        <button class="modal-close" id="modal-close" aria-label="關閉">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
